# .github/workflows/fetch-blogdata.yml
name: Fetch Blog Data from Strapi

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours as a backup safety net
  workflow_dispatch:
  repository_dispatch:
    types: [strapi-content-updated]

permissions:
  contents: write

jobs:
  fetch-blogdata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Warm up Strapi instance
        env:
          API_URL: ${{ secrets.STRAPI_API_URL }}
        run: |
          MAX_ATTEMPTS=6
          DELAY=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${API_URL}/blog-posts?pagination[pageSize]=1" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "[warmup] Strapi responded with 200 on attempt $i"
              exit 0
            fi
            if [ "$STATUS" = "404" ]; then
              echo "[warmup] Strapi is awake but endpoint returned 404 on attempt $i — API may need permission/config fix"
              exit 0
            fi
            echo "[warmup] Attempt $i/$MAX_ATTEMPTS — status: $STATUS, retrying in ${DELAY}s..."
            sleep $DELAY
          done
          echo "[warmup] Strapi did not respond after $MAX_ATTEMPTS attempts — proceeding anyway"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Disable postinstall
        run: |
          node -e "let p=require('./package.json');p.scripts=p.scripts||{};p.scripts.postinstall='true';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Fetch blog posts from Strapi and update blogdata.json
        continue-on-error: true
        env:
          NUXT_PUBLIC_API_URL: ${{ secrets.STRAPI_API_URL }}
        run: node scripts/fetchBlogData.js

      - name: Commit and push blogdata.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update blogdata.json from Strapi [skip ci]'
          file_pattern: |
            public/blogdata.json
            .last-fetch-timestamp

      - name: Install sitemap package
        run: npm install sitemap

      - name: Generate sitemap.xml
        run: node scripts/generateSitemap.js

      - name: Commit and push sitemap.xml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update sitemap.xml [skip ci]'
          file_pattern: public/sitemap.xml

      - name: Trigger site deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-deploy

